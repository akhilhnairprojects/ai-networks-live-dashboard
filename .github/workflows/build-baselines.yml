name: build-baselines

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build baseline JSON from the Excel workbooks
        run: python pipeline/build_baselines.py

      - name: Commit the baselines
        run: |
          git config user.name  "data-refresh-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Baselines unchanged."
          else
            git commit -m "Build Week 1 / Week 3 baselines from source workbooks"
            git push
          fi
